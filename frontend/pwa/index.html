<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Debrief Assistant</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        text-align: center;
      }
      .card {
        width: min(540px, 100%);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 1.25rem;
      }
      h1 { margin: 0 0 .5rem; font-size: 1.3rem; }
      p { margin: 0; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Voice Debrief Assistant</h1>
        <p>PWA shell served by FastAPI for pre-alpha.</p>
      </section>
    </main>
  </body>
</html>
